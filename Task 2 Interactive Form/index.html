<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="form-container">
      <!-- Progress Indicator -->
      <div class="progress-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <!-- Page 1 -->
      <div class="form-page active" id="page1">
        <form id="contactForm" novalidate>
          <!-- First Name and Last Name -->
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" required />
              <span class="error-message"></span>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" required />
              <span class="error-message"></span>
            </div>
          </div>

          <!-- E-mail and WhatsApp -->
          <div class="form-row">
            <div class="form-group">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" required />
              <span class="error-message"></span>
            </div>
            <div class="form-group">
              <label for="whatsapp">telephone number whatsapp</label>
              <input type="tel" id="whatsapp" name="whatsapp" required />
              <span class="error-message"></span>
            </div>
          </div>

          <!-- Call phone and City -->
          <div class="form-row">
            <div class="form-group">
              <label for="callPhone">Call phone</label>
              <input type="tel" id="callPhone" name="callPhone" required />
              <span class="error-message"></span>
            </div>
            <div class="form-group">
              <label for="city">First Name</label>
              <input type="text" id="city" name="city" required />
              <span class="error-message"></span>
            </div>
          </div>

          <!-- Your address -->
          <div class="form-group full-width">
            <label for="address">Your address</label>
            <input type="text" id="address" name="address" required />
            <span class="error-message"></span>
          </div>

          <!-- Another field -->
          <div class="form-group full-width">
            <label for="extraField">First Name</label>
            <input type="text" id="extraField" name="extraField" />
            <span class="error-message"></span>
          </div>

          <!-- Stat and Zip code -->
          <div class="form-row">
            <div class="form-group">
              <label for="state">Stat</label>
              <input type="text" id="state" name="state" required />
              <span class="error-message"></span>
            </div>
            <div class="form-group">
              <label for="zipCode">Zip code</label>
              <input type="text" id="zipCode" name="zipCode" required />
              <span class="error-message"></span>
            </div>
          </div>

          <!-- Divider Line -->
          <div class="divider"></div>

          <!-- Contact Method -->
          <div class="form-group full-width">
            <label class="main-label"
              >What is the best way to contact you?</label
            >
            <div class="checkbox-row">
              <label class="checkbox-label">
                <input type="checkbox" name="contactMethod" value="phone" />
                <span>Phone</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="contactMethod" value="whatsapp" />
                <span>WhatsApp</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="contactMethod" value="email" />
                <span>Email</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="contactMethod" value="either" />
                <span>Either</span>
              </label>
            </div>
            <span class="error-message"></span>
          </div>

          <!-- Next Button -->
          <div class="form-actions">
            <button type="button" class="btn btn-next" id="nextBtn">
              Next
            </button>
          </div>
        </form>
      </div>

      <!-- Page 2 -->
      <div class="form-page" id="page2">
        <!-- Summary Display -->
        <div class="summary-container" id="summaryContainer">
          <h2>Your Information</h2>
          <div id="summaryContent"></div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn-back" id="backBtn">Back</button>
          <button type="button" class="btn btn-submit" id="submitBtn">
            Submit
          </button>
        </div>
      </div>

      <!-- Success Message -->
      <div class="success-modal" id="successModal">
        <div class="modal-content">
          <div class="success-icon">✓</div>
          <h2>Form Submitted Successfully!</h2>
          <p>Thank you for your submission. We will contact you soon.</p>
          <button type="button" class="btn btn-close" id="closeModal">
            Close
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
