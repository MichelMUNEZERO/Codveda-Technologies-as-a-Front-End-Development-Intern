<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi Media - Media Links</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 40px 60px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        text-align: center;
        max-width: 500px;
      }

      h1 {
        color: #333;
        margin-bottom: 30px;
        font-size: 2.5em;
      }

      .links-container p {
        margin: 20px 0;
        font-size: 1.1em;
        color: #555;
      }

      .media-link {
        display: inline-block;
        padding: 10px 20px;
        margin: 5px;
        text-decoration: none;
        color: white;
        border-radius: 8px;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        font-weight: bold;
      }

      .video-link {
        background: #f5576c;
      }

      .image-link {
        background: #4facfe;
      }

      .audio-link {
        background: #43e97b;
      }

      .media-link:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .media-display {
        margin-top: 30px;
        display: none;
      }

      .media-display.active {
        display: block;
      }

      video,
      audio {
        width: 100%;
        max-width: 500px;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      img {
        max-width: 100%;
        height: auto;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .close-btn {
        background: #ff4757;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 15px;
        font-weight: bold;
        transition: background 0.3s;
      }

      .close-btn:hover {
        background: #ff3838;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Multi Media</h1>
      <div class="links-container">
        <p>
          Play the video by clicking
          <a
            href="#"
            class="media-link video-link"
            onclick="
              showMedia('video');
              return false;
            "
          >
            Video Link
          </a>
        </p>
        <p>
          View the image by clicking
          <a
            href="#"
            class="media-link image-link"
            onclick="
              showMedia('image');
              return false;
            "
          >
            Image Link
          </a>
        </p>
        <p>
          Listen to the audio by clicking
          <a
            href="#"
            class="media-link audio-link"
            onclick="
              showMedia('audio');
              return false;
            "
          >
            Audio Link
          </a>
        </p>
      </div>

      <!-- Media Display Area -->
      <div id="video-display" class="media-display">
        <video id="video-player" controls>
          <source src="source/Video.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
        <br />
        <button class="close-btn" onclick="hideMedia('video')">Close</button>
      </div>

      <div id="image-display" class="media-display">
        <img id="image-viewer" src="source/Image pixel.jpg" alt="Image" />
        <br />
        <button class="close-btn" onclick="hideMedia('image')">Close</button>
      </div>

      <div id="audio-display" class="media-display">
        <audio id="audio-player" controls>
          <source
            src="source/Alex Warren  Eternity Official Video.mp3"
            type="audio/mpeg"
          />
          Your browser does not support the audio tag.
        </audio>
        <br />
        <button class="close-btn" onclick="hideMedia('audio')">Close</button>
      </div>
    </div>

    <script>
      function showMedia(type) {
        // Hide all media displays
        document.querySelectorAll(".media-display").forEach((el) => {
          el.classList.remove("active");
        });

        // Pause all media
        document.getElementById("video-player").pause();
        document.getElementById("audio-player").pause();

        // Show selected media
        const display = document.getElementById(type + "-display");
        display.classList.add("active");

        // Auto-play video and audio
        if (type === "video") {
          document.getElementById("video-player").play();
        } else if (type === "audio") {
          document.getElementById("audio-player").play();
        }
      }

      function hideMedia(type) {
        const display = document.getElementById(type + "-display");
        display.classList.remove("active");

        // Pause media
        if (type === "video") {
          document.getElementById("video-player").pause();
        } else if (type === "audio") {
          document.getElementById("audio-player").pause();
        }
      }
    </script>
  </body>
</html>
